<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - RoseEducation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ============================================================
           RESET + DESIGN TOKENS
        ============================================================ */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #06060a;
            --bg-1: #0c0c12;
            --bg-2: #111119;
            --bg-3: #16161f;
            --border: rgba(255,255,255,0.07);
            --border-md: rgba(255,255,255,0.12);
            --text-1: #f1f5f9;
            --text-2: #94a3b8;
            --text-3: #64748b;
            --orange: #f97316;
            --orange-2: #fb923c;
            --teal: #14b8a6;
            --teal-2: #2dd4bf;
            --grad: linear-gradient(135deg, #f97316 0%, #14b8a6 100%);
            --grad-text: linear-gradient(135deg, #fb923c 0%, #2dd4bf 100%);
            --radius: 14px;
            --radius-lg: 20px;
            --radius-xl: 28px;

            /* Token màu đỏ cho hộp thông báo lỗi */
            --red-alert: #ef4444;
            --red-alert-bg: rgba(239, 68, 68, 0.1);
            --red-alert-border: rgba(239, 68, 68, 0.25);
        }

        html {
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background:
                    radial-gradient(circle at 15% 15%, rgba(249,115,22,0.18), transparent 30%),
                    radial-gradient(circle at 85% 20%, rgba(20,184,166,0.14), transparent 30%),
                    radial-gradient(circle at 50% 100%, rgba(249,115,22,0.08), transparent 35%),
                    var(--bg);
            color: var(--text-1);
            line-height: 1.6;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
            background-size: 32px 32px;
            mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 35%, transparent 100%);
            pointer-events: none;
            opacity: 0.7;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            opacity: 0.6;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button, input {
            font-family: inherit;
        }

        /* ============================================================
           AUTH CARD
        ============================================================ */
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 430px;
            padding: 36px 32px;
            background: rgba(17,17,25,0.88);
            border: 1px solid var(--border-md);
            border-radius: var(--radius-xl);
            box-shadow:
                    0 0 0 1px rgba(255,255,255,0.03),
                    0 32px 80px rgba(0,0,0,0.5),
                    0 0 60px rgba(249,115,22,0.06);
            backdrop-filter: blur(18px) saturate(160%);
        }

        .login-container::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(135deg, rgba(249,115,22,0.35), rgba(20,184,166,0.28), transparent 60%);
            -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header h1 {
            font-size: 30px;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 8px;
            background: var(--grad-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-header p {
            font-size: 14px;
            color: var(--text-2);
        }

        /* HỘP THÔNG BÁO LỖI (Gộp gọn gàng dùng Token màu) */
        .error-alert-box {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--red-alert-bg);
            border: 1px solid var(--red-alert-border);
            border-radius: var(--radius);
            color: var(--red-alert);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 24px;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-2);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            color: var(--text-3);
            font-size: 15px;
            transition: color 0.2s ease;
        }

        .input-wrapper input {
            width: 100%;
            padding: 13px 15px 13px 45px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 14px;
            color: var(--text-1);
            outline: none;
            transition: all 0.2s ease;
            background: rgba(22,22,31,0.9);
        }

        .input-wrapper input::placeholder {
            color: var(--text-3);
        }

        .input-wrapper input:focus {
            border-color: rgba(45,212,191,0.45);
            background: rgba(22,22,31,1);
            box-shadow: 0 0 0 4px rgba(20,184,166,0.10);
        }

        .input-wrapper:focus-within i {
            color: var(--teal-2);
        }

        .form-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            font-size: 13px;
            margin: 4px 0 24px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-2);
        }

        .remember-me input {
            accent-color: var(--orange);
        }

        .forgot-pass,
        .login-footer a {
            color: var(--teal-2);
            font-weight: 700;
            transition: color 0.15s ease;
        }

        .forgot-pass:hover,
        .login-footer a:hover {
            color: var(--orange-2);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--orange);
            color: #fff;
            border: none;
            border-radius: 100px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 0 0 0 rgba(249,115,22,0.4);
        }

        .btn-login:hover {
            background: #ea6009;
            transform: translateY(-1px);
            box-shadow: 0 0 24px rgba(249,115,22,0.35);
        }

        .login-footer {
            text-align: center;
            margin-top: 26px;
            font-size: 13px;
            color: var(--text-2);
        }

        @media (max-width: 480px) {
            body {
                padding: 16px;
            }

            .login-container {
                padding: 30px 22px;
                border-radius: var(--radius-lg);
            }

            .form-actions {
                align-items: flex-start;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-header">
        <h1>RoseEducation</h1>
        <p>Vui lòng đăng nhập để tiếp tục</p>
    </div>

    <div th:if="${param.error}" class="error-alert-box">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span>Tên tài khoản hoặc mật khẩu không chính xác.</span>
    </div>

    <form class="login-form" th:action="@{/login}" method="POST">
        <div class="input-group">
            <label for="username">Tên đăng nhập</label>
            <div class="input-wrapper">
                <i class="fa-regular fa-user"></i>
                <input type="text" id="username" name="username" placeholder="Nhập tài khoản hoặc email" required>
            </div>
        </div>

        <div class="input-group">
            <label for="password">Mật khẩu</label>
            <div class="input-wrapper">
                <i class="fa-regular fa-lock"></i>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
        </div>

        <div class="form-actions">
            <label class="remember-me">
                <input type="checkbox"> Ghi Nhớ Đăng Nhập
            </label>
            <a href="#" class="forgot-pass">Quên mật khẩu?</a>
        </div>

        <button type="submit" class="btn-login">Đăng Nhập</button>
    </form>

    <div class="login-footer">
        <p>Chưa có tài khoản? <a th:href="@{/dang-ky}">Đăng ký ngay</a></p>
    </div>
</div>

</body>
</html>
